name: Java CI with Gradle

# ─── 1. DÉCLENCHEURS ──────────────────────────────────────────────────────────
on:
  push:                        # Se déclenche sur chaque push...
    branches: [ "**" ]         # ...sur TOUTES les branches
  pull_request:                # Et aussi sur les pull requests
    branches: [ "**" ]

# ─── 2. PERMISSIONS ───────────────────────────────────────────────────────────
permissions:
  contents: read               # Lecture seule du repo (bonne pratique sécurité)

# ─── 3. JOBS ──────────────────────────────────────────────────────────────────
jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest     # Machine virtuelle Ubuntu fournie par GitHub (gratuit)

    # ─── 4. STEPS (étapes séquentielles) ──────────────────────────────────────
    steps:

      # Étape 1 : Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Installer Java (sans dependency submission)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'           # Change selon ta version (17, 21...)
          distribution: 'temurin'      # Distribution Eclipse Temurin (ex-AdoptOpenJDK)
          # ⚠️ PAS de cache: 'gradle' ici → évite les problèmes de dependency submission

      # Étape 3 : Rendre le wrapper Gradle exécutable (nécessaire sur Linux)
      - name: Grant execute permission to Gradle wrapper
        run: chmod +x gradlew

      # Étape 4 : Lancer les tests
      - name: Run tests with Gradle
        run: ./gradlew test
        # Gradle télécharge ses dépendances et exécute tous les tests

      # Étape 5 (optionnel) : Publier le rapport de tests dans l'interface GitHub
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()                   # Même si les tests échouent, on veut le rapport !
        with:
          name: test-report
          path: build/reports/tests/test/
          retention-days: 7